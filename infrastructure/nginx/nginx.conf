# ==============================================================================
# PalliCare - Nginx Reverse Proxy Configuration (Production)
# AIIMS Bhopal | Palliative Care & Pain Management Platform
# ==============================================================================
#
# DEPLOYMENT:
#   - Place this file at /etc/nginx/nginx.conf or /etc/nginx/conf.d/pallicare.conf
#   - SSL certificates expected at /etc/nginx/ssl/
#   - Obtain certificates via Let's Encrypt / AIIMS CA
#   - Test config: nginx -t
#   - Reload: nginx -s reload
#
# ARCHITECTURE:
#   Client --> Nginx (SSL termination) --> ECS Fargate (NestJS API)
#                                      --> ECS Fargate (WebSocket)
#                                      --> S3/CloudFront (static assets)
#
# ==============================================================================

# ------------------------------------------------------------------------------
# Main context
# ------------------------------------------------------------------------------
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    # --------------------------------------------------------------------------
    # Basic settings
    # --------------------------------------------------------------------------
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # --------------------------------------------------------------------------
    # Logging format (JSON for structured log ingestion)
    # --------------------------------------------------------------------------
    log_format json_combined escape=json
        '{'
            '"time_local":"$time_local",'
            '"remote_addr":"$remote_addr",'
            '"remote_user":"$remote_user",'
            '"request":"$request",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"http_x_forwarded_for":"$http_x_forwarded_for",'
            '"upstream_response_time":"$upstream_response_time",'
            '"request_id":"$request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # --------------------------------------------------------------------------
    # Gzip compression
    # --------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        application/xml
        application/fhir+json
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml;

    # --------------------------------------------------------------------------
    # Rate limiting zones
    # --------------------------------------------------------------------------

    # Global rate limit: 100 requests/sec per IP
    limit_req_zone $binary_remote_addr zone=global:10m rate=100r/s;

    # API rate limit: 30 requests/sec per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Auth rate limit: 5 requests/sec per IP (OTP, login)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # Upload rate limit: 5 requests/sec per IP
    limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/s;

    # Sync rate limit: 10 requests/sec per IP
    limit_req_zone $binary_remote_addr zone=sync:10m rate=10r/s;

    # WebSocket connection limit: 10 connections per IP
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

    # Rate limit response
    limit_req_status 429;
    limit_conn_status 429;

    # --------------------------------------------------------------------------
    # Upstream definitions
    # --------------------------------------------------------------------------

    # NestJS API backend (ECS Fargate tasks behind ALB)
    upstream api_backend {
        least_conn;
        server api-alb.internal.pallicare.aiims.edu:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # WebSocket server (ECS Fargate tasks behind NLB)
    upstream ws_backend {
        # ip_hash ensures sticky sessions for WebSocket connections
        ip_hash;
        server ws-nlb.internal.pallicare.aiims.edu:3001 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # --------------------------------------------------------------------------
    # Connection and request size limits
    # --------------------------------------------------------------------------
    client_max_body_size 50m;
    client_body_timeout 30s;
    client_header_timeout 15s;
    send_timeout 30s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 60s;

    # --------------------------------------------------------------------------
    # HTTP -> HTTPS redirect
    # --------------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name pallicare.aiims.edu api.pallicare.aiims.edu;

        # ACME challenge for Let's Encrypt certificate renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP requests to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ==========================================================================
    # API Server: api.pallicare.aiims.edu
    # Backend REST API + WebSocket
    # ==========================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name api.pallicare.aiims.edu;

        # ----------------------------------------------------------------------
        # SSL / TLS configuration
        # ----------------------------------------------------------------------
        ssl_certificate /etc/nginx/ssl/pallicare-api.crt;
        ssl_certificate_key /etc/nginx/ssl/pallicare-api.key;
        ssl_trusted_certificate /etc/nginx/ssl/pallicare-ca-chain.crt;

        # TLS 1.2 and 1.3 only (DPDPA compliance)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers on;

        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ----------------------------------------------------------------------
        # Security headers
        # ----------------------------------------------------------------------
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(self), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://cdn.pallicare.aiims.edu; connect-src 'self' wss://api.pallicare.aiims.edu https://api.pallicare.aiims.edu; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        # Remove server version headers
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;

        # Pass request ID for tracing
        add_header X-Request-ID $request_id always;

        # ----------------------------------------------------------------------
        # Health check endpoint (no rate limit, no auth)
        # ----------------------------------------------------------------------
        location = /health {
            proxy_pass http://api_backend/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # Prometheus metrics endpoint (restrict to internal monitoring)
        location = /metrics {
            # Allow only from internal monitoring network
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            deny all;
            proxy_pass http://api_backend:9090/metrics;
            access_log off;
        }

        # ----------------------------------------------------------------------
        # Authentication endpoints (strict rate limiting)
        # ----------------------------------------------------------------------
        location ~ ^/api/v[0-9]+/auth/ {
            limit_req zone=auth burst=10 nodelay;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Restrict body size for auth requests
            client_max_body_size 1k;
        }

        # ----------------------------------------------------------------------
        # File upload endpoints (larger body, separate rate limit)
        # ----------------------------------------------------------------------
        location ~ ^/api/v[0-9]+/uploads/ {
            limit_req zone=upload burst=5 nodelay;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Allow larger bodies for file upload metadata
            client_max_body_size 1m;
        }

        # ----------------------------------------------------------------------
        # Sync endpoints (dedicated rate limit)
        # ----------------------------------------------------------------------
        location ~ ^/api/v[0-9]+/sync/ {
            limit_req zone=sync burst=20 nodelay;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Sync payloads can be larger (batch offline data)
            client_max_body_size 10m;

            # Longer timeout for large sync batches
            proxy_read_timeout 120s;
        }

        # ----------------------------------------------------------------------
        # FHIR endpoints
        # ----------------------------------------------------------------------
        location ~ ^/api/v[0-9]+/fhir/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Accept "application/fhir+json";
        }

        # ----------------------------------------------------------------------
        # ABDM callback endpoints (from ABDM Gateway)
        # ----------------------------------------------------------------------
        location /abdm/callback {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # ----------------------------------------------------------------------
        # WebSocket proxy (Socket.IO for real-time alerts and dashboard updates)
        # ----------------------------------------------------------------------
        location /ws/ {
            limit_conn ws_conn 10;

            proxy_pass http://ws_backend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # WebSocket timeouts
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            # Disable buffering for real-time
            proxy_buffering off;
            proxy_cache off;
        }

        # Socket.IO specific path
        location /socket.io/ {
            limit_conn ws_conn 10;

            proxy_pass http://ws_backend/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            proxy_cache off;
        }

        # ----------------------------------------------------------------------
        # CSP violation reports
        # ----------------------------------------------------------------------
        location = /csp-report {
            proxy_pass http://api_backend/csp-report;
            proxy_set_header Host $host;
            proxy_set_header Content-Type "application/csp-report";
            client_max_body_size 10k;
            access_log /var/log/nginx/csp-reports.log json_combined;
        }

        # ----------------------------------------------------------------------
        # General API endpoints (default rate limit)
        # ----------------------------------------------------------------------
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Enable keepalive to upstream
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Buffer settings for API responses
            proxy_buffers 8 16k;
            proxy_buffer_size 16k;

            client_max_body_size 10m;
        }

        # ----------------------------------------------------------------------
        # Block everything else on API domain
        # ----------------------------------------------------------------------
        location / {
            return 404;
        }
    }

    # ==========================================================================
    # Clinician Dashboard: pallicare.aiims.edu
    # Static React application
    # ==========================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name pallicare.aiims.edu;

        # ----------------------------------------------------------------------
        # SSL / TLS (same configuration as API server)
        # ----------------------------------------------------------------------
        ssl_certificate /etc/nginx/ssl/pallicare.crt;
        ssl_certificate_key /etc/nginx/ssl/pallicare.key;
        ssl_trusted_certificate /etc/nginx/ssl/pallicare-ca-chain.crt;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers on;

        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ----------------------------------------------------------------------
        # Security headers for the dashboard
        # ----------------------------------------------------------------------
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://cdn.pallicare.aiims.edu; connect-src 'self' https://api.pallicare.aiims.edu wss://api.pallicare.aiims.edu; font-src 'self' https://cdn.pallicare.aiims.edu; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        # Root for React build output
        root /var/www/pallicare-dashboard/build;
        index index.html;

        # Global rate limit for dashboard
        limit_req zone=global burst=100 nodelay;

        # ----------------------------------------------------------------------
        # Static assets with aggressive caching
        # Hashed filenames from React build allow long cache lifetimes
        # ----------------------------------------------------------------------
        location /static/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            try_files $uri =404;
        }

        # JavaScript and CSS bundles
        location ~* \.(js|css)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            try_files $uri =404;
        }

        # Images, fonts, and media
        location ~* \.(ico|gif|png|jpg|jpeg|svg|webp|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public";
            add_header X-Content-Type-Options "nosniff" always;
            try_files $uri =404;
        }

        # manifest.json and service worker (short cache for updates)
        location ~* (manifest\.json|service-worker\.js|sw\.js)$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            try_files $uri =404;
        }

        # ----------------------------------------------------------------------
        # React SPA fallback
        # All routes that don't match a static file serve index.html
        # React Router handles client-side routing
        # ----------------------------------------------------------------------
        location / {
            try_files $uri $uri/ /index.html;

            # Don't cache the index.html (allow instant updates)
            add_header Cache-Control "no-cache";
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        }

        # ----------------------------------------------------------------------
        # Block access to source maps in production
        # ----------------------------------------------------------------------
        location ~* \.map$ {
            return 404;
        }

        # Block access to hidden files
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
