# ==============================================================================
# PalliCare - Local Development Docker Compose
# AIIMS Bhopal | Palliative Care & Pain Management Platform
# ==============================================================================
#
# USAGE:
#   Start all services:   docker compose up -d
#   Stop all services:    docker compose down
#   View logs:            docker compose logs -f [service_name]
#   Reset data:           docker compose down -v
#
# PREREQUISITES:
#   - Docker Desktop 4.x+ with Compose V2
#   - At least 4 GB RAM allocated to Docker
#   - Ports 3000, 3001, 5432, 6379, 9000, 9001 available
#
# ==============================================================================

name: pallicare

services:
  # ============================================================================
  # PostgreSQL 16 + TimescaleDB 2.x
  # Primary database for all relational data
  # ============================================================================
  postgres:
    image: timescale/timescaledb:2.14.2-pg16
    container_name: pallicare-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pallicare
      POSTGRES_USER: pallicare_user
      POSTGRES_PASSWORD: pallicare_dev_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=en_US.utf8 --lc-ctype=en_US.utf8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U pallicare_user -d pallicare",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pallicare-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=timescaledb"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "log_statement=mod"
      - "-c"
      - "log_min_duration_statement=200"
      - "-c"
      - "timezone=UTC"

  # ============================================================================
  # Redis 7
  # Cache, session store, OTP storage, BullMQ job queues, rate limiting
  # ============================================================================
  redis:
    image: redis:7.2-alpine
    container_name: pallicare-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pallicare-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    command:
      - "redis-server"
      - "--maxmemory"
      - "200mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
      - "--save"
      - "60 1000"

  # ============================================================================
  # MinIO (S3-compatible Object Storage)
  # Voice notes, photos, education media, export files
  # ============================================================================
  minio:
    image: minio/minio:RELEASE.2024-02-17T01-15-57Z
    container_name: pallicare-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console (Web UI)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - pallicare-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    command: server /data --console-address ":9001"

  # ============================================================================
  # MinIO Bucket Initialization
  # Creates required buckets on first run
  # ============================================================================
  minio-init:
    image: minio/mc:RELEASE.2024-02-16T11-05-48Z
    container_name: pallicare-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - pallicare-network
    entrypoint: >
      /bin/sh -c "
      mc alias set pallicare http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing pallicare/pallicare-uploads;
      mc mb --ignore-existing pallicare/pallicare-media;
      mc mb --ignore-existing pallicare/pallicare-backups;
      mc mb --ignore-existing pallicare/pallicare-exports;
      mc anonymous set download pallicare/pallicare-media;
      echo 'MinIO buckets initialized successfully';
      exit 0;
      "

  # ============================================================================
  # PalliCare API Service (NestJS)
  # Core backend application
  # ============================================================================
  api:
    build:
      context: ../../..
      dockerfile: Dockerfile
      target: development
    container_name: pallicare-api
    restart: unless-stopped
    ports:
      - "3000:3000"   # REST API
      - "3001:3001"   # WebSocket (Socket.IO)
      - "9090:9090"   # Prometheus metrics
      - "9229:9229"   # Node.js debugger
    environment:
      NODE_ENV: local
      APP_PORT: 3000
      WS_PORT: 3001
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pallicare
      DB_USERNAME: pallicare_user
      DB_PASSWORD: pallicare_dev_password
      DB_SSL: "false"
      DB_POOL_MIN: 2
      DB_POOL_MAX: 10
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      REDIS_TLS: "false"
      REDIS_KEY_PREFIX: "pallicare:"
      # Storage (MinIO)
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_UPLOADS: pallicare-uploads
      S3_BUCKET_MEDIA: pallicare-media
      S3_FORCE_PATH_STYLE: "true"
      # Auth
      JWT_ALGORITHM: RS256
      JWT_ACCESS_TOKEN_EXPIRY: 1h
      JWT_REFRESH_TOKEN_EXPIRY: 30d
      JWT_ISSUER: pallicare.aiims.edu
      JWT_AUDIENCE: pallicare-api
      OTP_LENGTH: 6
      OTP_EXPIRY_SECONDS: 300
      # Logging
      LOG_LEVEL: debug
      LOG_FORMAT: pretty
      # Feature flags (development defaults)
      FEATURE_ABHA_LINKING: "false"
      FEATURE_VOICE_INPUT: "true"
      FEATURE_CAREGIVER_MODE: "true"
      FEATURE_OFFLINE_SYNC: "true"
      FEATURE_FHIR_EXPORT: "false"
      FEATURE_WHATSAPP_NOTIFICATIONS: "false"
      # Metrics
      METRICS_ENABLED: "true"
      METRICS_PORT: 9090
    volumes:
      # Bind mount source code for hot-reload
      - ../../../backend/src:/app/src:ro
      - ../../../backend/package.json:/app/package.json:ro
      # Persist node_modules in named volume (faster than bind mount)
      - api_node_modules:/app/node_modules
      # JWT keys for local development
      - ./keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:3000/health || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - pallicare-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ============================================================================
  # Elasticsearch 8.x (Optional - for medication search + audit log indexing)
  # Uncomment to enable full-text search during local development
  # ============================================================================
  # elasticsearch:
  #   image: docker.elastic.co/elasticsearch/elasticsearch:8.12.1
  #   container_name: pallicare-elasticsearch
  #   restart: unless-stopped
  #   ports:
  #     - "9200:9200"
  #   environment:
  #     - discovery.type=single-node
  #     - xpack.security.enabled=false
  #     - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
  #   volumes:
  #     - elasticsearch_data:/usr/share/elasticsearch/data
  #   healthcheck:
  #     test:
  #       [
  #         "CMD-SHELL",
  #         "curl -f http://localhost:9200/_cluster/health || exit 1",
  #       ]
  #     interval: 15s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 60s
  #   networks:
  #     - pallicare-network
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 1G
  #       reservations:
  #         memory: 512M

  # ============================================================================
  # Mailhog (Local email testing - catches all outgoing emails)
  # Access UI at http://localhost:8025
  # ============================================================================
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: pallicare-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - pallicare-network
    deploy:
      resources:
        limits:
          memory: 64M

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  postgres_data:
    driver: local
    name: pallicare-postgres-data
  redis_data:
    driver: local
    name: pallicare-redis-data
  minio_data:
    driver: local
    name: pallicare-minio-data
  api_node_modules:
    driver: local
    name: pallicare-api-node-modules
  # elasticsearch_data:
  #   driver: local
  #   name: pallicare-elasticsearch-data

# ==============================================================================
# Networks
# ==============================================================================
networks:
  pallicare-network:
    driver: bridge
    name: pallicare-network
