# ==============================================================================
# PalliCare — Production Docker Compose
# AIIMS Bhopal | Palliative Care & Pain Management Platform
# ==============================================================================
#
# USAGE:
#   Start:    docker compose -f docker-compose.production.yml up -d
#   Stop:     docker compose -f docker-compose.production.yml down
#   Logs:     docker compose -f docker-compose.production.yml logs -f api
#
# NOTE: For full production, use managed services (RDS, ElastiCache, S3).
#       This compose file is for single-server MVP deployment.
# ==============================================================================

name: pallicare-prod

services:
  # ============================================================================
  # Nginx Reverse Proxy
  # SSL termination, load balancing, static file serving
  # ============================================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: pallicare-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/nginx/ssl:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    networks:
      - pallicare-network
    deploy:
      resources:
        limits:
          memory: 128M

  # ============================================================================
  # Certbot (Let's Encrypt auto-renewal)
  # ============================================================================
  certbot:
    image: certbot/certbot:latest
    container_name: pallicare-certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;"
    networks:
      - pallicare-network

  # ============================================================================
  # PalliCare API (NestJS)
  # ============================================================================
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
      target: production
    container_name: pallicare-api
    restart: unless-stopped
    expose:
      - "3001"
      - "3002"
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
      APP_PORT: 3001
      WS_PORT: 3002
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - pallicare-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ============================================================================
  # PalliCare Dashboard (Next.js)
  # ============================================================================
  dashboard:
    build:
      context: ../../apps/dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.pallicare.aiims.edu/v1
    container_name: pallicare-dashboard
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: https://pallicare.aiims.edu
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - pallicare-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  certbot-webroot:
    driver: local

networks:
  pallicare-network:
    driver: bridge
    name: pallicare-prod-network
