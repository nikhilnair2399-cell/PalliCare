name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  # ── Shared types ────────────────────────────────────────────────
  shared-types:
    name: Build shared types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/shared-types

  # ── API ─────────────────────────────────────────────────────────
  api:
    name: API — lint, test, build
    runs-on: ubuntu-latest
    needs: shared-types

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pallicare
          POSTGRES_PASSWORD: pallicare
          POSTGRES_DB: pallicare_test
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://pallicare:pallicare@localhost:5432/pallicare_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint:api
      - run: npm run test:api -- --passWithNoTests
      - run: npm run build:api

  # ── Dashboard ───────────────────────────────────────────────────
  dashboard:
    name: Dashboard — lint, test, build
    runs-on: ubuntu-latest
    needs: shared-types

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint:dashboard
      - name: Test dashboard
        run: npm run test --workspace=apps/dashboard -- --passWithNoTests
        continue-on-error: true
      - run: npm run build:dashboard
        env:
          NEXT_PUBLIC_API_URL: https://api.pallicare.example.com

  # ── Flutter mobile ──────────────────────────────────────────────
  mobile:
    name: Flutter — analyze, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.x"
          channel: stable
          cache: true
      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get
      - name: Analyze
        working-directory: apps/mobile
        run: flutter analyze --no-fatal-infos
      - name: Run tests
        working-directory: apps/mobile
        run: flutter test --no-pub
